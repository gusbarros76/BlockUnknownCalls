build:
  maxIssues: 0

config:
  validation: true

complexity:
  LongMethod:
    threshold: 60
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 8

style:
  MagicNumber:
    active: false
  WildcardImport:
    active: false
  MaxLineLength:
    maxLineLength: 140

naming:
  FunctionNaming:
    functionPattern: '[a-z][a-zA-Z0-9]*|`[^`]+`'
