build:
  maxIssues: 0

config:
  validation: true

complexity:
  LongMethod:
    threshold: 120
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 8

exceptions:
  TooGenericExceptionCaught:
    active: false

style:
  MagicNumber:
    active: false
  WildcardImport:
    active: false
  MaxLineLength:
    maxLineLength: 140

naming:
  FunctionNaming:
    # Allow PascalCase for Composable functions (Android convention)
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*|`[^`]+`'
