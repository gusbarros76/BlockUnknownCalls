build:
  maxIssues: 0

config:
  validation: true

complexity:
  LongMethod:
    threshold: 100
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 8

exceptions:
  TooGenericExceptionCaught:
    active: false

style:
  MagicNumber:
    active: false
  WildcardImport:
    active: false
  MaxLineLength:
    maxLineLength: 140

naming:
  FunctionNaming:
    functionPattern: '[a-z][a-zA-Z0-9]*|`[^`]+`'
    excludeAnnotatedFunction:
      - 'Composable'
      - 'Preview'
